<!DOCTYPE html>
<html lang="es" xlmns:th = "http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>

    <!--Formulario para el registro de sesion-->
    <div class = "container-md" style="margin: 5rem; margin-left: 20rem; max-width: 50rem;">
        <form th:action = "@{/auth/Registro}" method = "post">
            <h1>Registro de usuario</h1>
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label" >Nombre</label>
                <input type="text" class="form-control" id="Name" aria-describedby="emailHelp" name = "name">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Apellido</label>
                <input type="text" class="form-control" id="LastName" name = "lastName">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label" >Correo electrónico</label>
                <input type="email" class="form-control" id="Email" name = "Email">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="Password" name = "Password">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Repetir contraseña</label>
                <input type="password" class="form-control" id="repeatPassword">
            </div>
            <button type="submit" class="btn btn-primary" onclick = validar()>Registrar usuario</button>
        </form>
    </div>

</body>
</html>
